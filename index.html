<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Age Calculator Pro — Discover Your Story</title>
<meta name="description" content="The most comprehensive age calculator. Discover your exact age, generation, zodiac, numerology, life stats, milestones and more."/>
<meta property="og:title" content="Age Calculator Pro"/>
<meta property="og:description" content="Discover your exact age, generation, zodiac, numerology, life stats and milestones."/>
<meta property="og:type" content="website"/>
<meta name="theme-color" content="#080a12"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,300;1,9..144,400;1,9..144,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
/* ─────────────────────────────────────────────
   RESET & BASE
───────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080a12;
  --bg1:#0d1020;
  --bg2:#121628;
  --surf:#161b2e;
  --surf2:#1c2338;
  --surf3:#232b42;
  --border:rgba(255,255,255,.06);
  --border-h:rgba(255,255,255,.12);
  --border-g:rgba(212,175,100,.2);
  --gold:#d4af64;
  --gold-b:#e8c97a;
  --gold-dim:rgba(212,175,100,.1);
  --gold-glow:rgba(212,175,100,.15);
  --silver:#a8b4c8;
  --text:#eef0f6;
  --text2:#8b95aa;
  --text3:#525c70;
  --green:#4ade80;
  --green-dim:rgba(74,222,128,.1);
  --red:#f87171;
  --red-dim:rgba(248,113,113,.1);
  --blue:#60a5fa;
  --blue-dim:rgba(96,165,250,.1);
  --r:18px;--r-sm:12px;
  --font-display:'Fraunces',Georgia,serif;
  --font-body:'DM Sans',system-ui,sans-serif;
  --ease-spring:cubic-bezier(.16,1,.3,1);
  --ease-out:cubic-bezier(.25,.46,.45,.94);
}
html{scroll-behavior:smooth;}
body{
  min-height:100vh;background:var(--bg);color:var(--text);
  font-family:var(--font-body);font-size:15px;line-height:1.6;
  overflow-x:hidden;position:relative;
}

/* Grain texture overlay */
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
  background-size:200px;opacity:.4;mix-blend-mode:overlay;
}
/* Radial glow meshes */
body::after{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 900px 600px at 20% -10%,rgba(212,175,100,.05) 0%,transparent 60%),
    radial-gradient(ellipse 700px 500px at 85% 110%,rgba(96,165,250,.04) 0%,transparent 60%),
    radial-gradient(ellipse 500px 400px at 50% 50%,rgba(212,175,100,.02) 0%,transparent 70%);
}

/* ─────────────────────────────────────────────
   LAYOUT
───────────────────────────────────────────── */
.page{position:relative;z-index:1;width:100%;max-width:1000px;margin:0 auto;padding:0 20px;}
section{padding:0 0 80px;}

/* ─────────────────────────────────────────────
   NAVBAR
───────────────────────────────────────────── */
nav{
  position:sticky;top:0;z-index:100;
  padding:14px 20px;
  background:rgba(8,10,18,.8);backdrop-filter:blur(24px);
  border-bottom:1px solid var(--border);
}
.nav-inner{
  max-width:1000px;margin:0 auto;
  display:flex;align-items:center;justify-content:space-between;
}
.nav-logo{
  display:flex;align-items:center;gap:10px;
  text-decoration:none;
}
.nav-logo-mark{
  width:32px;height:32px;border-radius:9px;
  background:linear-gradient(135deg,rgba(212,175,100,.25),rgba(212,175,100,.06));
  border:1px solid var(--border-g);
  display:flex;align-items:center;justify-content:center;font-size:.95rem;
  box-shadow:0 0 20px rgba(212,175,100,.12);
}
.nav-logo-text{
  font-family:var(--font-display);font-size:1.05rem;font-weight:600;
  color:var(--text);letter-spacing:-.01em;
}
.nav-logo-text span{color:var(--gold);}
.nav-pill{
  font-size:10px;font-weight:500;letter-spacing:.18em;text-transform:uppercase;
  color:var(--text2);padding:5px 12px;border-radius:50px;
  border:1px solid var(--border);background:var(--surf);
}

/* ─────────────────────────────────────────────
   HERO
───────────────────────────────────────────── */
.hero{
  padding:80px 0 60px;
  text-align:center;
}
.hero-eyebrow{
  display:inline-flex;align-items:center;gap:8px;
  font-size:10px;font-weight:500;letter-spacing:.26em;text-transform:uppercase;
  color:var(--gold);border:1px solid var(--border-g);
  background:var(--gold-dim);border-radius:50px;
  padding:6px 16px;margin-bottom:28px;
  animation:fadeDown .6s var(--ease-spring) both;
}
.hero-dot{width:5px;height:5px;border-radius:50%;background:var(--gold);box-shadow:0 0 8px var(--gold);animation:pulse 2s ease infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}

.hero h1{
  font-family:var(--font-display);font-weight:300;
  font-size:clamp(3rem,9vw,6.5rem);line-height:1.0;
  letter-spacing:-.04em;
  color:var(--text);
  animation:fadeDown .7s .05s var(--ease-spring) both;
}
.hero h1 em{font-style:italic;color:var(--gold);}
.hero h1 .line2{display:block;font-weight:600;}

.hero-sub{
  margin-top:16px;font-size:1rem;color:var(--text2);
  font-weight:300;max-width:480px;margin-inline:auto;
  animation:fadeDown .7s .1s var(--ease-spring) both;
}

/* ─────────────────────────────────────────────
   INPUT CARD
───────────────────────────────────────────── */
.input-section{
  margin-top:48px;
  animation:fadeUp .8s .15s var(--ease-spring) both;
}
.input-card{
  background:var(--surf);
  border:1px solid var(--border);
  border-radius:24px;
  padding:36px;
  box-shadow:
    0 0 0 1px rgba(255,255,255,.02),
    0 32px 80px rgba(0,0,0,.5),
    0 0 60px rgba(212,175,100,.03);
  position:relative;overflow:hidden;
}
.input-card::before{
  content:'';position:absolute;inset:0;pointer-events:none;
  background:linear-gradient(135deg,rgba(212,175,100,.03) 0%,transparent 50%);
}

.input-label{
  font-size:10px;font-weight:500;letter-spacing:.22em;text-transform:uppercase;
  color:var(--gold);margin-bottom:20px;
  display:flex;align-items:center;gap:8px;
}
.input-label::after{content:'';flex:1;height:1px;background:linear-gradient(to right,var(--border-g),transparent);}

.date-grid{display:grid;grid-template-columns:1fr 1fr 1.5fr;gap:12px;margin-bottom:20px;}
.field{display:flex;flex-direction:column;gap:8px;}
.field label{font-size:10px;font-weight:500;letter-spacing:.2em;text-transform:uppercase;color:var(--text2);}
.field input{
  background:rgba(255,255,255,.04);
  border:1px solid var(--border);
  border-radius:14px;
  color:var(--text);
  font-family:var(--font-display);
  font-size:clamp(1.6rem,5vw,2.2rem);
  font-weight:400;
  padding:16px 12px;
  text-align:center;
  width:100%;outline:none;
  transition:border-color .25s,background .25s,box-shadow .25s;
  -moz-appearance:textfield;
  letter-spacing:-.02em;
}
.field input::-webkit-outer-spin-button,
.field input::-webkit-inner-spin-button{-webkit-appearance:none;}
.field input::placeholder{color:var(--text3);font-family:var(--font-body);font-size:1.1rem;}
.field input:focus{
  border-color:var(--gold);
  background:var(--gold-dim);
  box-shadow:0 0 0 4px rgba(212,175,100,.08),0 0 30px rgba(212,175,100,.06);
}
.field input.err{
  border-color:var(--red)!important;
  box-shadow:0 0 0 4px rgba(248,113,113,.1)!important;
}
.err-msg{
  min-height:20px;font-size:12px;font-weight:500;
  color:var(--red);margin-bottom:16px;
  display:flex;align-items:center;gap:6px;
}

.calc-btn{
  width:100%;padding:18px;border:none;border-radius:16px;
  background:linear-gradient(135deg,#c9a94a 0%,#d4af64 35%,#b8962e 100%);
  color:#0d0f1a;font-family:var(--font-body);font-size:13px;font-weight:600;
  letter-spacing:.18em;text-transform:uppercase;cursor:pointer;
  position:relative;overflow:hidden;
  box-shadow:0 4px 28px rgba(212,175,100,.35),0 0 0 1px rgba(255,255,255,.12) inset;
  transition:transform .2s var(--ease-spring),box-shadow .2s;
}
.calc-btn::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.2) 0%,rgba(255,255,255,0) 50%);
}
.calc-btn:hover{transform:translateY(-2px);box-shadow:0 10px 40px rgba(212,175,100,.5);}
.calc-btn:active{transform:translateY(0);}
.calc-btn .btn-icon{margin-right:8px;font-size:1rem;}

/* ─────────────────────────────────────────────
   RESULTS WRAPPER
───────────────────────────────────────────── */
#results{display:none;}
#results.visible{display:block;}

/* ─────────────────────────────────────────────
   SECTION HEADERS
───────────────────────────────────────────── */
.sec-header{
  display:flex;align-items:center;gap:14px;
  margin-bottom:20px;
}
.sec-icon{
  width:38px;height:38px;border-radius:11px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:1.1rem;
  background:var(--surf2);border:1px solid var(--border);
}
.sec-title{font-family:var(--font-display);font-size:1.4rem;font-weight:600;letter-spacing:-.02em;}
.sec-sub{font-size:12px;color:var(--text2);margin-top:1px;font-weight:300;}
.sec-line{flex:1;height:1px;background:linear-gradient(to right,var(--border),transparent);}

/* ─────────────────────────────────────────────
   HERO RESULT — BIG NUMBERS
───────────────────────────────────────────── */
.age-hero{
  background:linear-gradient(135deg,#0e1426 0%,#131a30 100%);
  border:1px solid rgba(212,175,100,.18);
  border-radius:24px;
  padding:48px 32px;
  text-align:center;
  position:relative;overflow:hidden;
  margin-bottom:14px;
  box-shadow:0 0 0 1px rgba(255,255,255,.03),0 40px 80px rgba(0,0,0,.5);
  animation:fadeUp .6s .0s var(--ease-spring) both;
}
.age-hero::before{
  content:'';position:absolute;top:-120px;left:50%;transform:translateX(-50%);
  width:500px;height:250px;
  background:radial-gradient(ellipse,rgba(212,175,100,.08) 0%,transparent 70%);
  pointer-events:none;
}
.age-hero-label{
  font-size:10px;font-weight:500;letter-spacing:.28em;text-transform:uppercase;
  color:var(--gold);margin-bottom:32px;
}
.age-nums{display:flex;justify-content:center;align-items:flex-end;gap:0;}
.age-unit{
  padding:0 clamp(20px,6vw,56px);position:relative;
  display:flex;flex-direction:column;align-items:center;
}
.age-unit:not(:last-child)::after{
  content:'';position:absolute;right:0;top:8%;height:84%;
  width:1px;background:rgba(212,175,100,.12);
}
.age-num{
  font-family:var(--font-display);
  font-size:clamp(4.5rem,15vw,8.5rem);
  font-weight:600;line-height:.95;
  letter-spacing:-.05em;color:#fff;
  text-shadow:0 0 80px rgba(212,175,100,.25);
}
.age-unit-lbl{
  font-size:10px;font-weight:500;letter-spacing:.28em;text-transform:uppercase;
  color:var(--text2);margin-top:14px;
}

.age-summary{
  margin-top:28px;font-family:var(--font-display);
  font-size:clamp(1rem,3vw,1.35rem);font-weight:300;font-style:italic;
  color:var(--text2);
}
.age-summary strong{color:var(--gold);font-weight:600;font-style:normal;}

/* ─────────────────────────────────────────────
   LIVE TICKER
───────────────────────────────────────────── */
.live-card{
  background:var(--surf);border:1px solid var(--border);border-radius:var(--r);
  display:grid;grid-template-columns:repeat(3,1fr);
  margin-bottom:14px;overflow:hidden;
  animation:fadeUp .6s .05s var(--ease-spring) both;
}
.live-unit{
  padding:22px 16px;text-align:center;position:relative;
}
.live-unit:not(:last-child)::after{
  content:'';position:absolute;right:0;top:15%;height:70%;
  width:1px;background:var(--border);
}
.live-badge{
  position:absolute;top:12px;right:12px;
  display:flex;align-items:center;gap:4px;
  font-size:8px;font-weight:500;letter-spacing:.18em;text-transform:uppercase;
  color:var(--green);background:var(--green-dim);
  border:1px solid rgba(74,222,128,.18);border-radius:50px;padding:3px 8px;
}
.live-badge-dot{width:4px;height:4px;border-radius:50%;background:var(--green);animation:pulse 1s infinite;}
.live-num{
  font-family:var(--font-display);
  font-size:clamp(1.4rem,4.5vw,2.6rem);
  color:var(--gold);line-height:1;
  font-variant-numeric:tabular-nums;letter-spacing:-.02em;
}
.live-lbl{font-size:9px;font-weight:500;letter-spacing:.2em;text-transform:uppercase;color:var(--text2);margin-top:7px;}

/* ─────────────────────────────────────────────
   GRID HELPERS
───────────────────────────────────────────── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}

/* Generic card */
.card{
  background:var(--surf);border:1px solid var(--border);border-radius:var(--r);
  padding:22px;
  transition:border-color .25s,transform .25s,box-shadow .25s;
}
.card:hover{border-color:var(--border-h);transform:translateY(-2px);box-shadow:0 12px 36px rgba(0,0,0,.35);}

/* Stat tile */
.stat-tile{
  background:var(--surf);border:1px solid var(--border);border-radius:var(--r);
  padding:22px 14px;text-align:center;
  transition:border-color .25s,transform .25s;
}
.stat-tile:hover{border-color:var(--border-h);transform:translateY(-2px);}
.stat-tile-icon{font-size:1.6rem;margin-bottom:10px;display:block;}
.stat-tile-num{
  font-family:var(--font-display);font-size:clamp(1.1rem,3.5vw,1.7rem);
  color:var(--text);line-height:1;letter-spacing:-.02em;margin-bottom:6px;
}
.stat-tile-lbl{font-size:9px;font-weight:500;letter-spacing:.2em;text-transform:uppercase;color:var(--text2);}

/* Info tile */
.info-tile{
  background:var(--surf);border:1px solid var(--border);border-radius:var(--r);
  padding:22px 20px;display:flex;align-items:center;gap:16px;
  transition:border-color .25s,transform .25s;
}
.info-tile:hover{border-color:var(--border-h);transform:translateY(-2px);}
.info-tile-icon{
  flex-shrink:0;width:52px;height:52px;border-radius:14px;
  display:flex;align-items:center;justify-content:center;font-size:1.6rem;
  background:var(--surf2);border:1px solid var(--border);
}
.info-tile-lbl{font-size:9px;font-weight:500;letter-spacing:.2em;text-transform:uppercase;color:var(--text2);margin-bottom:5px;}
.info-tile-val{font-size:15px;font-weight:600;color:var(--text);line-height:1.2;}
.info-tile-sub{font-size:11px;color:var(--text2);margin-top:3px;font-weight:300;}

/* ─────────────────────────────────────────────
   GENERATION CARD (special)
───────────────────────────────────────────── */
.gen-card{
  border-radius:var(--r);overflow:hidden;
  border:1px solid var(--border-g);
  box-shadow:0 0 50px rgba(212,175,100,.05);
}
.gen-header{
  padding:28px 28px 22px;
  background:linear-gradient(135deg,rgba(212,175,100,.1) 0%,rgba(212,175,100,.04) 100%);
  border-bottom:1px solid var(--border-g);
}
.gen-tag{
  display:inline-flex;align-items:center;gap:6px;
  font-size:9px;font-weight:500;letter-spacing:.24em;text-transform:uppercase;
  color:var(--gold);background:var(--gold-dim);border:1px solid var(--border-g);
  border-radius:50px;padding:4px 12px;margin-bottom:12px;
}
.gen-name{
  font-family:var(--font-display);font-size:clamp(1.8rem,5vw,2.8rem);
  font-weight:600;letter-spacing:-.03em;color:var(--text);
  margin-bottom:4px;
}
.gen-range{font-size:12px;color:var(--text2);font-weight:300;letter-spacing:.04em;}
.gen-body{padding:24px 28px;background:var(--surf);}
.gen-description{font-size:14px;color:var(--text2);line-height:1.75;margin-bottom:18px;font-weight:300;}
.gen-traits{display:flex;flex-wrap:wrap;gap:7px;}
.gen-trait{
  font-size:10px;font-weight:500;letter-spacing:.08em;
  padding:5px 12px;border-radius:50px;
  background:var(--surf2);border:1px solid var(--border);
  color:var(--text2);transition:border-color .2s;
}
.gen-trait:hover{border-color:var(--gold);color:var(--gold);}
.gen-famous{margin-top:18px;padding-top:18px;border-top:1px solid var(--border);}
.gen-famous-title{font-size:10px;font-weight:500;letter-spacing:.2em;text-transform:uppercase;color:var(--text2);margin-bottom:10px;}
.gen-famous-list{display:flex;flex-wrap:wrap;gap:7px;}
.gen-famous-item{
  font-size:11px;font-weight:500;
  padding:5px 12px;border-radius:50px;
  background:var(--surf3);border:1px solid var(--border);
  color:var(--text);
}

/* ─────────────────────────────────────────────
   ZODIAC CARD
───────────────────────────────────────────── */
.zodiac-card{
  background:var(--surf);border:1px solid var(--border);border-radius:var(--r);
  padding:24px;
}
.zodiac-top{display:flex;align-items:center;gap:16px;margin-bottom:16px;}
.zodiac-symbol{
  font-size:2.6rem;width:64px;height:64px;
  display:flex;align-items:center;justify-content:center;
  background:var(--surf2);border-radius:16px;border:1px solid var(--border);
  flex-shrink:0;
}
.zodiac-name{font-family:var(--font-display);font-size:1.5rem;font-weight:600;letter-spacing:-.02em;}
.zodiac-dates{font-size:11px;color:var(--text2);font-weight:300;margin-top:3px;}
.zodiac-planet{font-size:11px;color:var(--gold);margin-top:4px;}
.zodiac-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;}
.zodiac-tag{font-size:9px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;padding:4px 10px;border-radius:50px;background:var(--surf2);border:1px solid var(--border);color:var(--text2);}
.zodiac-compat{margin-top:14px;padding-top:14px;border-top:1px solid var(--border);}
.zodiac-compat-title{font-size:9px;font-weight:500;letter-spacing:.18em;text-transform:uppercase;color:var(--text2);margin-bottom:8px;}
.zodiac-compat-list{font-size:13px;font-weight:500;color:var(--text);}

/* ─────────────────────────────────────────────
   NUMEROLOGY
───────────────────────────────────────────── */
.num-card{
  background:var(--surf);border:1px solid var(--border);border-radius:var(--r);
  padding:24px;text-align:center;
}
.num-big{
  font-family:var(--font-display);
  font-size:clamp(3.5rem,12vw,6rem);
  font-weight:600;color:var(--gold);
  line-height:1;letter-spacing:-.04em;
  text-shadow:0 0 50px rgba(212,175,100,.3);
  margin-bottom:8px;
}
.num-title{font-size:10px;font-weight:500;letter-spacing:.2em;text-transform:uppercase;color:var(--text2);}
.num-desc{font-size:13px;color:var(--text2);margin-top:12px;line-height:1.65;font-weight:300;}

/* ─────────────────────────────────────────────
   LIFE STATS
───────────────────────────────────────────── */
.life-tile{
  background:var(--surf);border:1px solid var(--border);border-radius:var(--r);
  padding:20px 12px;text-align:center;
  transition:border-color .25s,transform .25s;
}
.life-tile:hover{border-color:rgba(212,175,100,.3);transform:translateY(-2px);}
.life-tile-icon{font-size:1.3rem;margin-bottom:8px;display:block;}
.life-tile-num{
  font-family:var(--font-display);
  font-size:clamp(.9rem,2.8vw,1.25rem);
  color:var(--gold);line-height:1;margin-bottom:5px;letter-spacing:-.01em;
}
.life-tile-lbl{font-size:8px;font-weight:500;letter-spacing:.18em;text-transform:uppercase;color:var(--text2);}

/* ─────────────────────────────────────────────
   PROGRESS
───────────────────────────────────────────── */
.prog-card{
  background:var(--surf);border:1px solid var(--border);border-radius:var(--r);
  padding:28px;
}
.prog-row{margin-bottom:20px;}
.prog-row:last-child{margin-bottom:0;}
.prog-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px;}
.prog-label{font-size:12px;font-weight:500;color:var(--text2);letter-spacing:.04em;}
.prog-pct{font-family:var(--font-display);font-size:1.6rem;color:var(--gold);letter-spacing:-.03em;}
.prog-track{height:6px;background:rgba(255,255,255,.06);border-radius:50px;overflow:hidden;}
